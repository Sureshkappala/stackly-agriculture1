<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Stackly Agri-Cloud - Sign in to access your farm telemetry database.">
  <title>Login | Stackly Agri-Cloud</title>
  
  <!-- Core Stylesheet -->
  <link rel="stylesheet" href="style.css">
  
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- Radial Background & Canvas Particles -->
  <div class="bg-radial-gradient"></div>
  <canvas id="bg-canvas"></canvas>

  <!-- ==========================================================================
       NAVBAR (Minimal version for focus)
  ========================================================================== -->
  <header class="header-nav">
    <div class="container nav-container">
      <a href="index.html" class="logo">
        <i class="fa-solid fa-layer-group"></i>
        <span>Stackly</span>
      </a>
      <div class="nav-buttons">
        <a href="index.html" class="btn btn-secondary"><i class="fa-solid fa-house"></i> Home</a>
      </div>
    </div>
  </header>

  <!-- ==========================================================================
       LOGIN CARD
  ========================================================================== -->
  <main class="container" style="min-height: 80vh; display: flex; align-items: center; justify-content: center;">
    <div class="card-glass form-card reveal active">
      <div class="form-header">
        <h2>Sign In to Stackly</h2>
        <p>Access your smart crop data servers</p>
      </div>

      <form id="login-form">
        <!-- Role Dropdown -->
        <div class="form-group">
          <label class="form-label" for="login-role">Select Role</label>
          <div class="form-select-wrapper">
            <select id="login-role" class="form-select" required>
              <option value="" disabled selected>Select Role</option>
              <option value="user">User Dashboard</option>
              <option value="admin">Admin Infrastructure</option>
            </select>
          </div>
        </div>

        <!-- Email Field -->
        <div class="form-group">
          <label class="form-label" for="login-email">Email Address</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-envelope input-icon"></i>
            <input type="email" id="login-email" class="form-input" placeholder="name@farmgrid.com" required>
          </div>
        </div>

        <!-- Password Field with Eye Mask -->
        <div class="form-group">
          <label class="form-label" for="login-password">Access Password</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-key input-icon"></i>
            <input type="password" id="login-password" class="form-input" placeholder="••••••••••••" required>
            <!-- Eye mask toggle symbol -->
            <button type="button" class="input-toggle-pwd" id="pwd-toggle" aria-label="Toggle Password Visibility">
              <i class="fa-solid fa-eye-slash" id="pwd-toggle-icon"></i>
            </button>
          </div>
          <!-- Strong Password Feedback Rules -->
          <div class="validation-feedback" style="margin-top:0.75rem; display:none;" id="pwd-rules">
            <div class="validation-hint invalid" id="rule-length"><i class="fa-solid fa-circle-dot"></i> At least 8 characters</div>
            <div class="validation-hint invalid" id="rule-upper"><i class="fa-solid fa-circle-dot"></i> One uppercase letter</div>
            <div class="validation-hint invalid" id="rule-lower"><i class="fa-solid fa-circle-dot"></i> One lowercase letter</div>
            <div class="validation-hint invalid" id="rule-digit"><i class="fa-solid fa-circle-dot"></i> One numeric digit</div>
            <div class="validation-hint invalid" id="rule-spec"><i class="fa-solid fa-circle-dot"></i> One special character</div>
          </div>
        </div>
        <div class="remember-me">
  <label>
    <input type="checkbox" id="rememberMe">
    Remember Me
  </label>
</div>

        <!-- Submit Button -->
        <button type="submit" class="btn btn-primary form-submit-btn" id="submit-btn" disabled>Authenticate Access</button>
      </form>

      <div class="form-footer">
        Don't have a database account? <a href="register.html">Get Started</a>
      </div>
    </div>
  </main>

  <!-- Form Validation & Interactive Logic -->
  <script>
    const emailInput = document.getElementById('login-email');
    const pwdInput = document.getElementById('login-password');
    const roleSelect = document.getElementById('login-role');
    const submitBtn = document.getElementById('submit-btn');
    const pwdRules = document.getElementById('pwd-rules');
    
    // Toggle Password Visibility
    const toggleBtn = document.getElementById('pwd-toggle');
    const toggleIcon = document.getElementById('pwd-toggle-icon');
    
    toggleBtn.addEventListener('click', () => {
      const isPwd = pwdInput.type === 'password';
      pwdInput.type = isPwd ? 'text' : 'password';
      toggleIcon.className = isPwd ? 'fa-solid fa-eye' : 'fa-solid fa-eye-slash';
    });

    // Password Validation Rules
    const rLength = document.getElementById('rule-length');
    const rUpper = document.getElementById('rule-upper');
    const rLower = document.getElementById('rule-lower');
    const rDigit = document.getElementById('rule-digit');
    const rSpec = document.getElementById('rule-spec');

    pwdInput.addEventListener('focus', () => {
      pwdRules.style.display = 'block';
    });

    pwdInput.addEventListener('input', validateForm);
    emailInput.addEventListener('input', validateForm);
    roleSelect.addEventListener('change', validateForm);

    function validateForm() {
      const pwd = pwdInput.value;
      const email = emailInput.value;
      const role = roleSelect.value;

      // Check rules
      const hasLength = pwd.length >= 8;
      const hasUpper = /[A-Z]/.test(pwd);
      const hasLower = /[a-z]/.test(pwd);
      const hasDigit = /[0-9]/.test(pwd);
      const hasSpec = /[^A-Za-z0-9]/.test(pwd);

      updateRuleState(rLength, hasLength);
      updateRuleState(rUpper, hasUpper);
      updateRuleState(rLower, hasLower);
      updateRuleState(rDigit, hasDigit);
      updateRuleState(rSpec, hasSpec);

      const isPwdStrong = hasLength && hasUpper && hasLower && hasDigit && hasSpec;
      const isEmailValid = emailInput.checkValidity() && email.includes('@');
      const isRoleSelected = role !== '';

      if (isPwdStrong && isEmailValid && isRoleSelected) {
        submitBtn.disabled = false;
      } else {
        submitBtn.disabled = true;
      }
    }

    function updateRuleState(element, isValid) {
      if (isValid) {
        element.classList.remove('invalid');
        element.classList.add('valid');
        element.querySelector('i').className = 'fa-solid fa-circle-check';
      } else {
        element.classList.remove('valid');
        element.classList.add('invalid');
        element.querySelector('i').className = 'fa-solid fa-circle-dot';
      }
    }

    // Submit Routing Logic
    document.getElementById('login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      
      const selectedRole = roleSelect.value;
      if (selectedRole === 'admin') {
        window.location.href = 'dashboard-admin.html';
      } else if (selectedRole === 'user') {
        window.location.href = 'dashboard-user.html';
      }
    });
  </script>

  <!-- Shared Particles -->
  <script src="main.js"></script>

</body>
</html>
